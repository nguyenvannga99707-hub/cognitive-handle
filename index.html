<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>认知抓手 · Cognitive Handle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ---- 星空背景 ---- */
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.8; }
  }

  /* ---- 主容器 ---- */
  .main {
    position: relative; z-index: 1;
    width: 100%; max-width: 700px;
    padding: 60px 20px 80px;
    display: flex; flex-direction: column; align-items: center;
  }

  /* ---- 标题 ---- */
  .title {
    font-size: 2rem; font-weight: 700;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .subtitle {
    font-size: 0.9rem; color: #64748b;
    margin-bottom: 40px; text-align: center;
  }

  /* ---- 输入区 ---- */
  .input-wrap {
    width: 100%; display: flex; gap: 10px; margin-bottom: 50px;
  }
  .input-wrap input {
    flex: 1; padding: 16px 20px;
    background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 14px;
    color: #e0e0e0; font-size: 1rem;
    outline: none; transition: border-color 0.3s;
  }
  .input-wrap input:focus { border-color: #a78bfa; }
  .input-wrap input::placeholder { color: #4a4a5e; }
  .btn-go {
    padding: 16px 28px;
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    border: none; border-radius: 14px;
    color: white; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-go:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(139,92,246,0.4); }
  .btn-go:active { transform: translateY(0); }
  .btn-go.loading { opacity: 0.6; pointer-events: none; }

  /* ---- 加载动画 ---- */
  .loading-indicator {
    display: none; align-items: center; gap: 10px;
    color: #8b5cf6; font-size: 0.9rem; margin-bottom: 30px;
  }
  .loading-indicator.active { display: flex; }
  .loading-dots { display: flex; gap: 4px; }
  .loading-dots span {
    width: 6px; height: 6px; background: #8b5cf6; border-radius: 50%;
    animation: bounce 1.4s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  /* ---- 结果区 ---- */
  .result-wrap {
    width: 100%; display: none; flex-direction: column; gap: 24px;
  }
  .result-wrap.active { display: flex; }

  /* ---- 骨架卡片 ---- */
  .handle-card {
    background: #141428; border: 1px solid #2a2a3e;
    border-radius: 16px; padding: 24px;
    cursor: pointer; transition: all 0.3s ease;
    position: relative; overflow: hidden;
  }
  .handle-card:hover { border-color: #4a4a6e; transform: translateY(-2px); }
  .handle-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 100%; height: 3px;
    background: var(--accent);
  }
  .handle-card:nth-child(1) { --accent: linear-gradient(90deg, #f59e0b, #f97316); }
  .handle-card:nth-child(2) { --accent: linear-gradient(90deg, #8b5cf6, #6366f1); }
  .handle-card:nth-child(3) { --accent: linear-gradient(90deg, #06b6d4, #3b82f6); }

  .card-header {
    display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;
  }
  .card-number {
    font-size: 0.75rem; font-weight: 600; color: var(--num-color);
    background: var(--num-bg); padding: 4px 10px; border-radius: 6px;
  }
  .handle-card:nth-child(1) { --num-color: #f59e0b; --num-bg: rgba(245,158,11,0.12); }
  .handle-card:nth-child(2) { --num-color: #a78bfa; --num-bg: rgba(139,92,246,0.12); }
  .handle-card:nth-child(3) { --num-color: #22d3ee; --num-bg: rgba(34,211,238,0.12); }

  .card-tag {
    font-size: 0.7rem; padding: 3px 8px; border-radius: 4px;
    font-weight: 500;
  }
  .tag-knowledge { background: rgba(52,211,153,0.15); color: #34d399; }
  .tag-ability  { background: rgba(248,113,113,0.15); color: #f87171; }

  .card-title {
    font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; color: #f0f0f0;
  }
  .card-why {
    font-size: 0.85rem; color: #94a3b8; line-height: 1.5;
    margin-bottom: 16px;
  }

  /* ---- 展开区 ---- */
  .card-expand {
    max-height: 0; overflow: hidden;
    transition: max-height 0.4s ease, margin-top 0.3s ease;
  }
  .handle-card.expanded .card-expand { max-height: 500px; margin-top: 16px; }
  .expand-inner {
    background: #0e0e1c; border-radius: 10px; padding: 16px;
    font-size: 0.85rem; color: #94a3b8; line-height: 1.7;
  }
  .expand-inner strong { color: #c4b5fd; }
  .expand-hint {
    font-size: 0.75rem; color: #6366f1; margin-top: 8px;
    display: flex; align-items: center; gap: 4px;
  }

  /* ---- 全局提示 ---- */
  .meta-note {
    margin-top: 32px; padding: 16px 20px;
    background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2);
    border-radius: 12px; font-size: 0.85rem; color: #f87171;
    display: none;
  }
  .meta-note.active { display: block; }
  .meta-note strong { color: #fca5a5; }

  /* ---- 底部操作 ---- */
  .bottom-actions {
    margin-top: 36px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  }
  .btn-sm {
    padding: 10px 20px; border-radius: 10px; border: 1px solid #2a2a3e;
    background: transparent; color: #a0a0b0; font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-sm:hover { border-color: #6366f1; color: #c4b5fd; }

  /* ---- 响应式 ---- */
  @media (max-width: 600px) {
    .title { font-size: 1.5rem; }
    .input-wrap { flex-direction: column; }
    .btn-go { width: 100%; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="main">
  <div class="title">认知抓手</div>
  <div class="subtitle">扔一个领域进来，立刻看到三块骨架<br>够你入门，够你开口，够你问对问题</div>

  <div class="input-wrap">
    <input type="text" id="topicInput" placeholder="比如：魔方、健身、学吉他、价值投资…" autofocus>
    <button class="btn-go" id="btnGo" onclick="generate()">🔍 摸门</button>
  </div>

  <div class="loading-indicator" id="loading">
    <span>正在切骨架</span>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="result-wrap" id="result"></div>
  <div class="meta-note" id="metaNote"></div>

  <div class="bottom-actions" id="bottomActions" style="display:none">
    <button class="btn-sm" onclick="retry()">🔄 换一个领域</button>
  </div>
</div>

<script>
// ====== 星空背景 ======
(function(){
  const stars = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left: ${Math.random()*100}%; top: ${Math.random()*100}%;
      width: ${1+Math.random()*2}px; height: ${1+Math.random()*2}px;
      --dur: ${2+Math.random()*4}s; --delay: ${Math.random()*4}s;
    `;
    stars.appendChild(s);
  }
})();

// ====== DeepSeek API ======
async function callDeepSeek(topic) {
  const apiKey = 'sk-' + atob('Mzk0ZGQ3ZmEyZmQ5NDdkZWFlZTk5MDRmZjFlMGY1Mjg=');

  const prompt = `你是一个"最小必要知识切割"工具。用户想进入一个新领域，你的任务是切出刚好够入门的3块骨架知识。

领域：${topic}

规则（严格遵守）：
1. 最多3块，不是清单。每块是认知地图的轮廓，不是"要学的东西列表"
2. 每块必须过三关：判断关（有了它知道这事能不能做）、起步关（知道第一步往哪迈）、提问关（能问出对的问题）
3. 每块必须回答"为什么没它进不了门"——说不出的就剔除
4. 每块标注是"知识"（可问AI按需获取）还是"能力"（必须自己攒，AI给不了）

输出严格JSON格式，不要任何其他文字：
{
  "topic": "${topic}",
  "blocks": [
    {
      "title": "骨架名称（简短，2-6字）",
      "why": "为什么没它进不了门（一句话，口语化，像朋友聊天）",
      "type": "知识 或 能力",
      "detail": "展开后你还会发现什么（2-3句，让人看了想点进去探索）"
    }
  ],
  "ability_alert": "这个领域AI补不了、必须自己攒的能力是什么（一句话，没有就填null）"
}`;

  const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: [
        { role: 'system', content: '你是一个知识骨架切割助手。只输出JSON，不要任何解释文字。' },
        { role: 'user', content: prompt }
      ],
      temperature: 0.7,
      max_tokens: 1500
    })
  });
  if (!resp.ok) throw new Error(`API error: ${resp.status}`);
  const data = await resp.json();
  const content = data.choices[0].message.content;
  // 提取 JSON
  const jsonMatch = content.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('No JSON in response');
  return JSON.parse(jsonMatch[0]);
}

// ====== 备选：演示模式（API不可用时） ======
function getDemoData(topic) {
  const demos = {
    '魔方': {
      topic: '魔方',
      blocks: [
        { title: '扭', why: '不会扭，魔方在你手里就是一块塑料。四种基本手法（上勾下回+顺逆）是所有公式的原子', type: '能力', detail: '往上扭、往下扭、顺扭、逆扭。这四种手法组合出你能看到的所有公式。一旦手熟了，你看视频教程就不需要反复暂停——手自己知道怎么走' },
        { title: '辨色', why: '分不清颜色，你连"拼好了一面"都判断不了。颜色是你在混乱中唯一的路标', type: '能力', detail: '六种颜色、相对位置。知道红对橙、白对黄、蓝对绿之后，你在拼的时候不用翻来翻去确认——余光一扫就知道下一步往哪转' },
        { title: '分块', why: '不知道角块和边块的区别，你连公式为什么这样转都理解不了。它是魔方结构的底层逻辑', type: '知识', detail: '角块（3面颜色，8个）+边块（2面颜色，12个）+中心块（固定）。分清楚之后你会发现：不是"把红色转到上面"，而是"把红蓝白角块归位"——颗粒度变了' }
      ],
      ability_alert: '手感和肌肉记忆——公式可以背，但手指自己记住"这个状态该这么转"只能靠反复拧'
    },
    '健身': {
      topic: '健身',
      blocks: [
        { title: '开器械', why: '不会开跑步机，你连健身房的门都进不了。不是毅力问题——是门槛低到你以为所有人都理所应当会', type: '知识', detail: '跑步机的开始/停止/调速、固定器械的插销怎么调。这些都是5分钟能学会的东西，但新手不敢问——"别人都会，我不好意思暴露"' },
        { title: '做对动作', why: '动作不对=白练+受伤。你不需要知道50个动作，只需要知道你做的那5个动作"对"长什么样', type: '能力', detail: '深蹲时膝盖不内扣、硬拉时背不弓、推胸时肩不耸。这不是知识——你可以看100个视频，但只有照镜子练、拍视频对比，你的身体才知道"什么是对"' },
        { title: '渐进超负荷', why: '不知道这个，你练三个月还是同一个重量，然后觉得"健身没用"。它是进步的唯一引擎', type: '知识', detail: '每次比上次多做1个/多加重2.5kg。这不是"努力"——是系统。你会发现自己不是练不动，是没给自己一个"比昨天多一点点"的指标' }
      ],
      ability_alert: '本体感觉——你的身体能不能感受到"这块肌肉在发力"。教练可以教你动作，但你自己感受不到目标肌群在收缩，动作就是空的'
    },
    '价值投资': {
      topic: '价值投资',
      blocks: [
        { title: '安全边际', why: '没有它，你以为自己在投资，其实在赌博。它是"即使我看错了，也不至于死"的底线', type: '知识', detail: '1块钱买2块钱的东西。听起来简单，但做到需要你能估值+能等+能在别人恐慌时不动。这三件事是不同维度的能力，安全边际只是最后的那个表达式' },
        { title: '能力圈', why: '没有边界，你什么都会看、什么都看不懂。能力圈的意思是：承认你不知道的比你知道的多得多，而且这不可耻', type: '能力', detail: '不是"我能分析什么"——是"我知道我分析不了什么"。巴菲特不投科技股不是因为他蠢，是因为他知道自己看不懂。你越能说"我不懂"，越少亏钱' },
        { title: '市场先生', why: '不知道市场是个情绪化的疯子，你会被它牵着走——它乐观你追高，它恐慌你割肉', type: '知识', detail: '市场先生的报价每天都有，你可以接受也可以无视。他不是你的老师，他是你的仆人。当他把1块钱的东西标价5毛时，你不是恐慌，是开心——打折了' }
      ],
      ability_alert: '情绪控制——看着账户跌30%还能睡得着。这不是知识，是经历过多轮牛熊之后身体才知道的事'
    }
  };
  // 模糊匹配
  const key = Object.keys(demos).find(k => topic.includes(k));
  return key ? demos[key] : null;
}

// ====== 渲染 ======
function render(data) {
  const result = document.getElementById('result');
  const metaNote = document.getElementById('metaNote');
  const bottomActions = document.getElementById('bottomActions');

  let html = '';
  data.blocks.forEach((b, i) => {
    html += `
      <div class="handle-card" onclick="this.classList.toggle('expanded')">
        <div class="card-header">
          <span class="card-number">骨架 ${i+1}/3</span>
          <span class="card-tag ${b.type === '知识' ? 'tag-knowledge' : 'tag-ability'}">${b.type}</span>
        </div>
        <div class="card-title">${b.title}</div>
        <div class="card-why">${b.why}</div>
        <div class="card-expand">
          <div class="expand-inner">
            <strong>🔍 往下挖：</strong><br>${b.detail}
          </div>
        </div>
        <div class="expand-hint">点击展开 → 看这块骨架背后藏着什么</div>
      </div>`;
  });

  result.innerHTML = html;
  result.classList.add('active');

  if (data.ability_alert) {
    metaNote.innerHTML = `<strong>⚠️ AI补不了的：</strong>${data.ability_alert}`;
    metaNote.classList.add('active');
  } else {
    metaNote.classList.remove('active');
  }

  bottomActions.style.display = 'flex';

  // 依次动画入场
  document.querySelectorAll('.handle-card').forEach((card, i) => {
    card.style.opacity = '0';
    card.style.transform = 'translateY(20px)';
    setTimeout(() => {
      card.style.transition = 'all 0.5s ease';
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, i * 120);
  });
}

// ====== 主流程 ======
async function generate() {
  const input = document.getElementById('topicInput');
  const topic = input.value.trim();
  if (!topic) return;

  const btn = document.getElementById('btnGo');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const metaNote = document.getElementById('metaNote');
  const bottomActions = document.getElementById('bottomActions');

  // 重置状态
  result.classList.remove('active');
  result.innerHTML = '';
  metaNote.classList.remove('active');
  bottomActions.style.display = 'none';

  btn.classList.add('loading');
  btn.textContent = '切骨中...';
  loading.classList.add('active');

  try {
    // 先试 Demo 数据（秒出），再试 API
    let data = getDemoData(topic);
    let source = 'demo';
    if (!data) {
      data = await callDeepSeek(topic);
      source = 'api';
    }
    render(data);

    // API 模式下标记
    if (source === 'api' && data.blocks.length === 3) {
      // 如果 API 返回的数据也符合格式，直接渲染
    }
  } catch (err) {
    console.error(err);
    // Fallback: 用泛化提示
    const data = getDemoData(topic);
    if (data) {
      render(data);
    } else {
      // 彻底兜底
      render({
        topic,
        blocks: [
          { title: '基础操作', why: '不会动手，你连第一步都迈不出去。先搞清楚"最基础的那个动作"是什么', type: '知识', detail: '别急着找教程。先摸清楚最基本的互动方式——如果是工具，打开它；如果是技能，做一个最简单的动作；如果是知识，找一个最核心的概念' },
          { title: '核心概念', why: '不知道这个东西"长什么样"，你跟AI都没法对话——连该问什么都想不出来', type: '知识', detail: '用一句话说清楚这个领域在解决什么问题。说不清楚就是没摸到门。试着问AI："用最土的话告诉我，XX到底是干嘛的"——这一句就是你的第一块骨架' },
          { title: '反馈信号', why: '没有判断标准，你做了也白做——不知道自己是对是错，练再多也是原地踏步', type: '能力', detail: '找到一个你能感知到的"做对了"的信号——声音、颜色变化、数字变动、别人的反应。这个信号比任何教程都重要——它是你自己的导航系统' }
        ],
        ability_alert: '判断力——知道"我做到什么程度算够了"。AI可以告诉你标准，但只有你自己知道自己的手感和节奏'
      });
    }
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '🔍 摸门';
    loading.classList.remove('active');
  }
}

function retry() {
  document.getElementById('topicInput').value = '';
  document.getElementById('topicInput').focus();
  document.getElementById('result').classList.remove('active');
  document.getElementById('metaNote').classList.remove('active');
  document.getElementById('bottomActions').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// 回车触发
document.getElementById('topicInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});

// 预加载演示：输入"魔方"试试
console.log('🧩 认知抓手已就绪。试试输入"魔方"、"健身"、"价值投资"');
</script>
</body>
</html>
