<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>认知抓手 v3 · Cognitive Handle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    overflow-x: hidden;
  }
  .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .star { position: absolute; background: white; border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite; animation-delay: var(--delay); opacity: 0; }
  @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:0.8} }

  .main { position: relative; z-index: 1; width: 100%; max-width: 720px; padding: 60px 20px 80px;
    display: flex; flex-direction: column; align-items: center; }

  .title { font-size: 2rem; font-weight: 700;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 40px; text-align: center; }

  .input-wrap { width: 100%; display: flex; gap: 10px; margin-bottom: 50px; }
  .input-wrap input { flex: 1; padding: 16px 20px; background: #1a1a2e; border: 1px solid #2a2a3e;
    border-radius: 14px; color: #e0e0e0; font-size: 1rem; outline: none; transition: border-color 0.3s; }
  .input-wrap input:focus { border-color: #a78bfa; }
  .input-wrap input::placeholder { color: #4a4a5e; }
  .btn-go { padding: 16px 28px; background: linear-gradient(135deg, #8b5cf6, #6366f1);
    border: none; border-radius: 14px; color: white; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
  .btn-go:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(139,92,246,0.4); }
  .btn-go:active { transform: translateY(0); }
  .btn-go.loading { opacity: 0.6; pointer-events: none; }

  .loading-indicator { display: none; align-items: center; gap: 10px; color: #8b5cf6; font-size: 0.9rem; margin-bottom: 30px; }
  .loading-indicator.active { display: flex; }
  .loading-dots { display: flex; gap: 4px; }
  .loading-dots span { width: 6px; height: 6px; background: #8b5cf6; border-radius: 50%;
    animation: bounce 1.4s ease-in-out infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

  .result-wrap { width: 100%; display: none; flex-direction: column; gap: 20px; }
  .result-wrap.active { display: flex; }

  /* 卡片 */
  .card-block { display: flex; flex-direction: column; gap: 8px; }
  .handle-card {
    background: #141428; border: 1px solid #2a2a3e; border-radius: 16px; padding: 20px 24px;
    cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
  }
  .handle-card:hover { border-color: #4a4a6e; transform: translateY(-1px); }
  .handle-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; }
  .layer-1 .handle-card::before { background: linear-gradient(90deg, #f59e0b, #f97316); }
  .layer-2 .handle-card::before { background: linear-gradient(90deg, #8b5cf6, #6366f1); }
  .layer-3 .handle-card::before { background: linear-gradient(90deg, #06b6d4, #3b82f6); }
  .layer-2 { padding-left: 20px; }
  .layer-3 { padding-left: 40px; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-tag { font-size: 0.65rem; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .tag-knowledge { background: rgba(52,211,153,0.15); color: #34d399; }
  .tag-ability  { background: rgba(248,113,113,0.15); color: #f87171; }
  .card-title { font-size: 1.1rem; font-weight: 700; color: #f0f0f0; margin-bottom: 4px; }
  .card-why { font-size: 0.82rem; color: #94a3b8; line-height: 1.5; }

  .card-expand { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
  .handle-card.expanded .card-expand { max-height: 600px; margin-top: 12px; }
  .expand-inner { background: #0e0e1c; border-radius: 10px; padding: 14px;
    font-size: 0.82rem; color: #94a3b8; line-height: 1.7; }
  .expand-inner strong { color: #c4b5fd; }

  /* 往下挖按钮 */
  .drill-btn { display: none; margin-top: 12px; padding: 10px 20px;
    background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.3); border-radius: 10px;
    color: #a78bfa; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; text-align: center; }
  .handle-card.expanded .drill-btn { display: block; }
  .drill-btn:hover { background: rgba(139,92,246,0.2); border-color: #8b5cf6; }
  .drill-btn.loading { opacity: 0.5; pointer-events: none; }

  /* 第四层锁 */
  .lock-screen {
    display: none; margin-top: 12px; padding: 20px;
    background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.3); border-radius: 12px;
    text-align: center;
  }
  .lock-screen.active { display: block; }
  .lock-icon { font-size: 2rem; margin-bottom: 8px; }
  .lock-msg { color: #f59e0b; font-size: 0.85rem; line-height: 1.6; }
  .lock-code { display: inline-block; margin-top: 10px; padding: 8px 16px;
    background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.4); border-radius: 8px;
    color: #fbbf24; font-family: monospace; font-size: 1.1rem; letter-spacing: 0.1em; }

  /* 子卡片容器 */
  .children-wrap { display: none; flex-direction: column; gap: 8px; margin-top: 0; }
  .children-wrap.active { display: flex; }

  .meta-note { margin-top: 28px; padding: 14px 18px;
    background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); border-radius: 12px;
    font-size: 0.82rem; color: #f87171; display: none; }
  .meta-note.active { display: block; }
  .meta-note strong { color: #fca5a5; }

  .stats-bar { margin-top: 20px; padding: 10px 14px;
    background: rgba(139,92,246,0.06); border: 1px solid rgba(139,92,246,0.15); border-radius: 10px;
    font-size: 0.72rem; color: #a78bfa; display: none; align-items: center; gap: 14px; justify-content: center; }
  .stats-bar.active { display: flex; }

  .bottom-actions { margin-top: 16px; display: flex; gap: 12px; justify-content: center; }
  .btn-sm { padding: 8px 16px; border-radius: 8px; border: 1px solid #2a2a3e;
    background: transparent; color: #a0a0b0; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
  .btn-sm:hover { border-color: #6366f1; color: #c4b5fd; }

  @media (max-width: 600px) { .title { font-size: 1.5rem; } .input-wrap { flex-direction: column; } .btn-go { width: 100%; } }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="main">
  <div class="title">认知抓手 v3</div>
  <div class="subtitle">三层分型 · 点一下裂三块 · 第四层暗语锁</div>

  <div class="input-wrap">
    <input type="text" id="topicInput" placeholder="比如：魔方、健身、学吉他…" autofocus>
    <button class="btn-go" id="btnGo" onclick="generate()">🔍 摸门</button>
  </div>

  <div class="loading-indicator" id="loading">
    <span>正在切骨架</span><div class="loading-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="result-wrap" id="result"></div>
  <div class="meta-note" id="metaNote"></div>
  <div class="stats-bar" id="statsBar">
    <span>📊 <strong id="statSearches">0</strong> 次搜索 · <strong id="statExpands">0</strong> 次展开 · <strong id="statDrills">0</strong> 次深挖</span>
  </div>
  <div class="bottom-actions" id="bottomActions" style="display:none">
    <button class="btn-sm" onclick="retry()">🔄 换一个领域</button>
  </div>
</div>

<script>
// ====== 星空 ======
(function(){
  const stars = document.getElementById('stars');
  for (let i=0;i<60;i++){const s=document.createElement('div');s.className='star';
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s;`;stars.appendChild(s);}
})();

// ====== Supabase ======
const SB_URL = 'https://huxjrjovoxwoolxmdgub.supabase.co';
const SB_KEY = ['sb_pub','lishable_EaNQK_SmhiaHfA','-LvPCe4w_d3rCCZEt'].join('');

function getSid() {
  let s = localStorage.getItem('ch_sid');
  if(!s){s='ch_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);localStorage.setItem('ch_sid',s);}
  return s;
}

let _sc=parseInt(localStorage.getItem('ch_sc')||'0'), _ec=parseInt(localStorage.getItem('ch_ec')||'0'), _dc=parseInt(localStorage.getItem('ch_dc')||'0');
let _maxFreeLayers = 3; // URL 参数可覆盖
let _restored = false;

// ====== URL 参数检测（续命链接） ======
(function(){
  const params = new URLSearchParams(window.location.search);
  const session = params.get('session');
  const passcode = params.get('passcode');
  const unlock = parseInt(params.get('unlock') || '0');

  if (session && passcode && unlock > 3) {
    _maxFreeLayers = unlock;
    _restored = true;
    localStorage.setItem('ch_sid', session);
    _passcode = passcode;

    // 显示续命模式提示
    document.querySelector('.subtitle').innerHTML = `🔓 续命模式 · 第1-${unlock}层已解锁<br>继续你之前的探索`;
    document.querySelector('.title').textContent = '认知抓手 · 续命';

    // 从 Supabase 恢复话题和路径
    (async function restore() {
      try {
        const r = await fetch(`${SB_URL}/rest/v1/handle_events?select=topic&session_id=eq.${encodeURIComponent(session)}&event_type=eq.search&order=created_at.desc&limit=1`,{
          headers:{'apikey':SB_KEY}
        });
        const data = await r.json();
        if(data && data.length > 0 && data[0].topic) {
          document.getElementById('topicInput').value = data[0].topic;
          // 自动触发生成
          setTimeout(() => generate(), 600);
        }
      } catch(e) {}
    })();
  }
})();
function upStats(){document.getElementById('statSearches').textContent=_sc;document.getElementById('statExpands').textContent=_ec;document.getElementById('statDrills').textContent=_dc;if(_sc+_ec+_dc>0)document.getElementById('statsBar').classList.add('active');}

async function log(type, p) {
  try {
    await fetch(`${SB_URL}/rest/v1/handle_events`,{method:'POST',
      headers:{'apikey':SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({session_id:getSid(),event_type:type,topic:p.topic||null,card_title:p.card_title||null,card_type:p.card_type||null,card_index:p.card_index??null,source:p.source||null,cards_generated:p.cards_generated||null,card_count:p.card_count??null,has_ability_alert:p.has_ability_alert??null,layer:p.layer??null,parent_card_title:p.parent_card_title||null,card_content:p.card_content||null,passcode:p.passcode||null,client_ts:Date.now()})
    });
  }catch(e){}
}
upStats();

// ====== DeepSeek API ======
const _dk='sk-'+atob('Mzk0ZGQ3ZmEyZmQ5NDdkZWFlZTk5MDRmZjFlMGY1Mjg=');

async function callAI(topic, context) {
  const baseRules = `你是一个"最小必要知识切割"工具。切出刚好够入门的骨架知识。

规则（严格遵守）：
1. 最多3块，不是清单。每块2-6字，用新手第一眼就能感知到的词，不要学术分类词
2. 每块必须过三关：判断关（知道这事能不能做）、起步关（知道第一步往哪迈）、提问关（能问出对的问题）
3. 每块必须说清"为什么没它进不了门"——说不出的就剔除
4. 每块标注是"知识"（可问AI按需获取）还是"能力"（必须自己攒）`;

  const prompt = context
    ? `${baseRules}\n\n领域：${topic}\n\n用户正在深入理解"${context.cardTitle}"——你之前说：${context.why}\n\n往下挖一层，切出3块更深入的子骨架。必须跟"${context.cardTitle}"直接相关。每块让用户感觉"原来如此"。\n\n输出严格JSON，不要任何其他文字：\n{"blocks":[{"title":"","why":"","type":"知识 或 能力","detail":""}]}`
    : `${baseRules}\n\n领域：${topic}\n\n切出3块入门骨架。输出严格JSON：\n{"topic":"${topic}","blocks":[{"title":"","why":"","type":"知识 或 能力","detail":""}],"ability_alert":"（这个领域AI补不了的能力是什么，没有就填null）"}`;

  console.log('🔄 callAI', topic, context ? 'drill' : 'search');
  const r = await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${_dk}`},
    body:JSON.stringify({model:'deepseek-chat',messages:[
      {role:'system',content:'知识骨架切割助手。只输出JSON。用新手能直接感知的词。'},
      {role:'user',content:prompt}
    ],temperature:0.7,max_tokens:1500})
  });
  if(!r.ok) {
    console.error('API error', r.status, await r.text());
    throw new Error(`API ${r.status}`);
  }
  const d = await r.json();
  const raw = d.choices[0].message.content;
  console.log('📦 raw response:', raw.slice(0, 200));
  const m = raw.match(/\{[\s\S]*\}/);
  if(!m) throw new Error('No JSON in response: '+raw.slice(0,100));
  return JSON.parse(m[0]);
}

// ====== 演示数据 ======
const DEMOS = {
  '魔方':{topic:'魔方',blocks:[
    {title:'扭',why:'不会扭，魔方就是一块塑料。四种基本手法是所有公式的原子',type:'能力',detail:'往上/往下/顺/逆——四手法组合出所有公式。手熟了，看教程不需要反复暂停'},
    {title:'辨色',why:'分不清颜色，连"拼好了"都判断不了',type:'能力',detail:'六色相对位置：红对橙、白对黄、蓝对绿。余光一扫就知道下一步往哪转'},
    {title:'分块',why:'不知道角块边块，公式为什么这样转都理解不了',type:'知识',detail:'角块(3面8个)+边块(2面12个)+中心块(固定)。分清楚后不是"把红色转到上面"而是"把红蓝白角块归位"'}
  ],ability_alert:'手感——公式可背，但手指自己记住"这个状态该这么转"只能靠反复拧'},
  '健身':{topic:'健身',blocks:[
    {title:'开器械',why:'不会开跑步机，你连健身房的门都进不了',type:'知识',detail:'跑步机的启停调速、固定器械插销——5分钟能学会，但新手不敢问'},
    {title:'做对动作',why:'动作不对=白练+受伤',type:'能力',detail:'深蹲膝盖不内扣、硬拉背不弓。看100个视频不如照镜子练——只有身体知道"什么是对"'},
    {title:'渐进超负荷',why:'不知道这个，练三个月同重量然后觉得"健身没用"',type:'知识',detail:'每次多做1个/多加重2.5kg。不是努力是系统'}
  ],ability_alert:'本体感觉——感受不到目标肌群收缩，动作就是空的'}
};

function getDemo(t){const k=Object.keys(DEMOS).find(x=>t.includes(x));return k?DEMOS[k]:null;}

// ====== 生成 passcode ======
function getPasscode(){return 'CH'+Math.random().toString(36).slice(2,8).toUpperCase();}
let _passcode = getPasscode();

// ====== 渲染卡片 ======
function renderCards(container, blocks, topic, layer, parentTitle, source) {
  blocks.forEach((b,i)=>{
    const block = document.createElement('div');
    block.className = 'card-block layer-'+layer;
    const cardJsonEncoded = encodeURIComponent(JSON.stringify(b));
    block.innerHTML = `
      <div class="handle-card" data-card-title="${b.title}" data-card-type="${b.type}" data-layer="${layer}">
        <div class="card-header">
          <span class="card-tag ${b.type==='知识'?'tag-knowledge':'tag-ability'}">${b.type}</span>
        </div>
        <div class="card-title">${b.title}</div>
        <div class="card-why">${b.why}</div>
        <div class="card-expand">
          <div class="expand-inner"><strong>🔍 往下：</strong><br>${b.detail}</div>
        </div>
        ${layer < _maxFreeLayers
          ? `<div class="drill-btn" data-topic="${topic}" data-layer="${layer}" data-card-title="${b.title}" data-card-json="${cardJsonEncoded}">🪜 再往下挖一层</div>`
          : layer >= _maxFreeLayers && layer < (_maxFreeLayers+1)
            ? '<div class="lock-screen"><div class="lock-icon">🔒</div><div class="lock-msg">你到了免费层的边界。<br>第四层需要一把钥匙。</div><div class="lock-code">暗语：'+_passcode+'</div><div class="lock-msg" style="margin-top:8px;font-size:0.75rem">把这个暗语发给创建者<br>验证你是真想看第四层的人</div></div>'
            : '<div class="lock-screen" style="border-color:rgba(52,211,153,0.3)"><div class="lock-icon">🏁</div><div class="lock-msg" style="color:#34d399">探索者，先到这里吧。<br>你已经挖了 '+layer+' 层——够深了。</div></div>'}
      </div>
      <div class="children-wrap"></div>
    `;

    // 展开/折叠
    const card = block.querySelector('.handle-card');
    card.addEventListener('click', function(e){
      if(e.target.closest('.drill-btn') || e.target.closest('.lock-screen')) return;
      const wasExpanded = this.classList.contains('expanded');
      this.classList.toggle('expanded');
      if(!wasExpanded){ _ec++; localStorage.setItem('ch_ec',_ec); }
      log(!wasExpanded?'card_expand':'card_collapse',{
        topic, card_title:b.title, card_type:b.type, card_index:i, source, layer,
        parent_card_title: parentTitle||null,
        card_content: {title:b.title, why:b.why, detail:b.detail, type:b.type}
      });
      upStats();
    });

    // 锁屏逻辑
    if(layer >= _maxFreeLayers) {
      const ls = card.querySelector('.lock-screen');
      if(ls) ls.classList.add('active');
      // log lock view (只有免费层边界才记)
      if(layer === _maxFreeLayers) {
        log('lock_view',{topic,card_title:b.title,layer,parent_card_title:parentTitle||null,source,passcode:_passcode});
      }
    }

    container.appendChild(block);
  });

  // 绑定所有 drill 按钮
  container.querySelectorAll('.drill-btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      drillDown(this);
    });
  });
}

// ====== 往下挖 ======
async function drillDown(btn) {
  const block = btn.closest('.card-block');
  const childrenWrap = block.querySelector('.children-wrap');
  
  if(childrenWrap.classList.contains('active')) return;

  const layer = parseInt(btn.dataset.layer);
  const topic = btn.dataset.topic;
  const cardTitle = btn.dataset.cardTitle;
  const cardJson = decodeURIComponent(btn.dataset.cardJson);
  
  btn.classList.add('loading');
  btn.textContent = '正在挖...';

  try {
    let parsed;
    try { parsed = JSON.parse(cardJson); } catch(e) { parsed = {title:cardTitle}; }
    const data = await callAI(topic, {cardTitle:parsed.title||cardTitle, why:parsed.why||''});
    const nextLayer = layer + 1;

    if(data.blocks && data.blocks.length > 0) {
      renderCards(childrenWrap, data.blocks.slice(0,3), topic, nextLayer, cardTitle, 'api');
      childrenWrap.classList.add('active');
      _dc++; localStorage.setItem('ch_dc',_dc);

      log('card_drilldown',{
        topic, layer:nextLayer, parent_card_title:cardTitle, source:'api',
        cards_generated: data.blocks.map(b=>b.title),
        card_count: data.blocks.length,
        card_content: data.blocks.map(b=>({title:b.title,why:b.why,detail:b.detail,type:b.type}))
      });
      upStats();
    }
  } catch(e) {
    console.error('drillDown error', e);
    // 静默失败——下次再点
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '🪜 再往下挖一层';
  }
}

// ====== 主流程 ======
async function generate() {
  const topic = document.getElementById('topicInput').value.trim();
  if(!topic) return;

  const btn = document.getElementById('btnGo'), loading = document.getElementById('loading'),
        result = document.getElementById('result'), mn = document.getElementById('metaNote');
  result.classList.remove('active'); result.innerHTML=''; mn.classList.remove('active');
  document.getElementById('bottomActions').style.display='none';
  btn.classList.add('loading'); btn.textContent='切骨中...'; loading.classList.add('active');

  _passcode = getPasscode(); // 新会话新暗语

  try {
    let data = getDemo(topic), source = 'demo';
    if(!data){ data = await callAI(topic); source = 'api'; }
    if(!data.blocks||data.blocks.length===0) throw new Error('empty');

    renderCards(result, data.blocks.slice(0,3), topic, 1, null, source);
    result.classList.add('active');

    if(data.ability_alert) {
      mn.innerHTML=`<strong>⚠️ AI补不了的：</strong>${data.ability_alert}`; mn.classList.add('active');
    }

    _sc++; localStorage.setItem('ch_sc',_sc);
    log('search',{topic,source,cards_generated:data.blocks.map(b=>b.title),card_count:data.blocks.length,has_ability_alert:!!data.ability_alert,layer:1,
      card_content: data.blocks.map(b=>({title:b.title,why:b.why,detail:b.detail,type:b.type}))});
    upStats();
    document.getElementById('bottomActions').style.display='flex';
  } catch(e) {
    console.error('generate error:', e);
    const fb = getDemo(topic) || {topic,blocks:[
      {title:'基础操作',why:'不会动手，连第一步都迈不出去',type:'知识',detail:'先搞清楚最基本的互动方式——工具就打开它，技能就做第一个动作'},
      {title:'核心概念',why:'不知道它"长什么样"，跟AI都没法对话',type:'知识',detail:'用一句话说清这个领域在解决什么问题。说不清就是没摸到门'},
      {title:'反馈信号',why:'没有判断标准，做对了你都不知道',type:'能力',detail:'找个你能感知的"做对了"的信号——声音、颜色变化、数字变动。这才是你的导航系统'}
    ],ability_alert:'判断力——知道自己做到什么程度算够了'};
    renderCards(result, fb.blocks, topic, 1, null, 'fallback');
    result.classList.add('active'); mn.innerHTML=`<strong>⚠️ AI补不了的：</strong>${fb.ability_alert}`; mn.classList.add('active');
  } finally {
    btn.classList.remove('loading'); btn.textContent='🔍 摸门'; loading.classList.remove('active');
  }
}

function retry() {
  document.getElementById('topicInput').value=''; document.getElementById('topicInput').focus();
  document.getElementById('result').classList.remove('active'); document.getElementById('result').innerHTML='';
  document.getElementById('metaNote').classList.remove('active');
  document.getElementById('bottomActions').style.display='none';
  document.getElementById('statsBar').classList.remove('active');
  _sc=0;_ec=0;_dc=0; localStorage.setItem('ch_sc','0');localStorage.setItem('ch_ec','0');localStorage.setItem('ch_dc','0');
  upStats(); window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('topicInput').addEventListener('keydown',e=>{if(e.key==='Enter')generate();});
console.log('🧩 认知抓手 v3 · 三层分型 + 四层暗语锁');
</script>
